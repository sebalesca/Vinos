<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Carilila — El regalo que no se olvida. Cajas de vino personalizadas.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F4EADA;
    --cream-2: #EADFC9;
    --paper: #FBF6EC;
    --wood: #B8895A;
    --wood-dark: #8B6440;
    --wood-deep: #5C3E24;
    --wine: #5C1A1B;
    --wine-2: #7A2425;
    --ink: #2A2119;
    --ink-soft: #4A3E32;
    --muted: #8A7B6A;
    --line: #D9C9AE;
    --gold: #B08851;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'DM Sans', system-ui, sans-serif; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(184,137,90,0.12), transparent 60%),
      radial-gradient(900px 500px at 0% 40%, rgba(92,26,27,0.05), transparent 60%),
      var(--paper);
  }
  .serif { font-family: 'Cormorant Garamond', 'Times New Roman', serif; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  img { max-width: 100%; display: block; }

  /* subtle grain */
  .grain::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    pointer-events: none;
    mix-blend-mode: multiply;
    opacity: 0.6;
  }

  /* wood grain texture */
  .wood-bg {
    background:
      repeating-linear-gradient(90deg, rgba(92,62,36,0.08) 0 2px, transparent 2px 7px),
      repeating-linear-gradient(90deg, rgba(92,62,36,0.05) 0 1px, transparent 1px 23px),
      linear-gradient(180deg, #C99A6B 0%, #B8895A 40%, #A77746 100%);
  }

  html { scroll-behavior: smooth; }
  body { overflow-x: hidden; }

  /* ============ RESPONSIVE ============ */

  /* Tablet — 2 cols -> stack, reduce padding */
  @media (max-width: 980px) {
    nav { padding: 18px 24px !important; flex-wrap: wrap !important; gap: 12px !important; }
    nav > div:nth-child(2) { display: none !important; } /* nav links */
    section { padding-left: 24px !important; padding-right: 24px !important; }

    /* Two-column grids collapse */
    section > div[style*="grid-template-columns: 1.05fr 1fr"],
    section > div[style*="grid-template-columns: 1fr 1fr"],
    section > div[style*="grid-template-columns: 1fr 1.05fr"],
    section > div[style*="grid-template-columns: 1fr 2fr"],
    section > div[style*="grid-template-columns: 1.15fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 40px !important;
    }
    /* Stats / stories grids */
    section > div > div[style*="grid-template-columns: repeat(3, 1fr)"],
    section > div > div[style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 16px !important;
    }
    /* Process 4-col row */
    section[id="proceso"] div[style*="grid-template-columns: repeat(4, 1fr)"] > div {
      border-right: none !important;
      border-bottom: 1px solid #D9C9AE !important;
      padding: 28px 0 !important;
    }
    /* Sticky preview stops being sticky on mobile (scroll feels trapped) */
    div[style*="position: sticky"] { position: static !important; }
    /* Reduce section vertical padding */
    section { padding-top: 72px !important; padding-bottom: 72px !important; }
    /* Footer grid */
    footer > div > div[style*="grid-template-columns: 2fr 1fr 1fr 1fr"] {
      grid-template-columns: 1fr 1fr !important;
      gap: 32px !important;
    }
  }

  /* Mobile — single column everything */
  @media (max-width: 640px) {
    nav { padding: 14px 18px !important; }
    nav > button { display: none !important; }
    section { padding-left: 18px !important; padding-right: 18px !important;
              padding-top: 56px !important; padding-bottom: 56px !important; }
    section > div > div[style*="grid-template-columns: repeat(2, 1fr)"],
    section > div > div[style*="grid-template-columns: repeat(3, 1fr)"],
    section > div > div[style*="grid-template-columns: repeat(4, 1fr)"] {
      grid-template-columns: 1fr !important;
    }
    /* Step grid inside configurator */
    div[style*="grid-template-columns: repeat(3, 1fr)"] { grid-template-columns: repeat(3, 1fr) !important; }
    /* Stats row collapses */
    section > div > div[style*="grid-template-columns: 1fr 2fr"] > div:last-child { flex-wrap: wrap !important; gap: 20px !important; }
    /* Hide the giant bg word */
    section > div[style*="font-size: clamp(240px"] { display: none !important; }
    /* Hide bottom ticker on very small */
    section > div[class~="mono"][style*="bottom: 0"] { font-size: 9px !important; padding: 12px 18px !important; gap: 12px; overflow: hidden; }
    /* Floating testimonial badges hidden on mobile */
    .desktop-only { display: none !important; }
  }

  /* Large desktop — cap content width */
  @media (min-width: 1500px) {
    section > div[style*="max-width: 1400px"] { max-width: 1400px !important; }
    nav { max-width: 1400px; margin: 0 auto; }
  }
  /* Ultra-wide — keep content centered, reduce hero font top */
  @media (min-width: 1800px) {
    section > div[style*="max-width: 1400px"] { max-width: 1500px !important; }
  }
  /* Hero on large screens: ensure section centers content and doesn't bleed */
  section { position: relative; }
  section > div { width: 100%; }

  /* ============ END RESPONSIVE ============ */
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "heroVariant": "artisan",
  "accent": "wine",
  "showConfigurator": true
}/*EDITMODE-END*/
</script>
